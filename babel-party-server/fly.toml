# fly launch --dockerfile Dockerfile
# fly secrets set GOOGLE_CLOUD_API_KEY=...
app = "babel-party-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  # Must match the PORT Fly injects into the container (default 8080).
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
